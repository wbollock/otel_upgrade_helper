<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenTelemetry Collector Release Notes Comparator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🟣</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="dark-mode-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
  <div id="app">
    <h1>OpenTelemetry Collector<br>Release Notes Comparator</h1>
    <div class="intro">
      <p>
        See what changed between two versions of
        <a href="https://github.com/open-telemetry/opentelemetry-collector" target="_blank" rel="noopener noreferrer">opentelemetry-collector</a> or
        <a href="https://github.com/open-telemetry/opentelemetry-collector-contrib" target="_blank" rel="noopener noreferrer">-contrib</a>,
        filtered to the components you actually run. Release note formats vary upstream, so always test upgrades carefully.
      </p>
      <p class="intro-note">
        Useful? <a href="https://github.com/wbollock/otel_upgrade_helper" target="_blank" rel="noopener noreferrer">Drop a ⭐ on GitHub</a>.
      </p>
    </div>
    <div id="config-paste-block">
      <textarea id="otel-config-paste" rows="3" placeholder="Paste your otelcol YAML config here to auto-select components..."></textarea>
      <div class="config-paste-actions">
        <button type="button" id="detect-components-btn">Detect components</button>
        <span id="detect-components-status" aria-live="polite"></span>
      </div>
    </div>
    <form class="controls">
      <div class="control-group">
        <label for="project-select">Project
          <select id="project-select">
            <option value="otelcol">opentelemetry-collector</option>
            <option value="otelcol-contrib">opentelemetry-collector-contrib</option>
          </select>
        </label>
        <span id="latest-version"></span>
      </div>
      <div class="control-group">
        <label for="from-version">From version
          <select id="from-version"></select>
        </label>
        <label for="to-version">To version
          <select id="to-version"></select>
        </label>
      </div>
      <div id="component-picker" class="control-group">
        <label for="component-search" id="component-picker-label">Components</label>
        <input type="text" id="component-search" placeholder="Search components..." autocomplete="off">
        <div id="component-picker-meta">
          <span id="component-count" aria-live="polite"></span>
          <button type="button" id="component-clear" hidden>Clear selection</button>
        </div>
        <div id="component-list" role="group" aria-labelledby="component-picker-label"></div>
      </div>
      <button type="button" id="compare-btn">Compare</button>
    </form>
    <div id="results-toolbar" hidden>
      <label class="toggle-label"><input type="checkbox" id="breaking-only"> Breaking changes only</label>
      <button type="button" id="copy-link-btn" title="Copy a shareable link to this comparison">Copy link</button>
      <span id="copy-link-status" aria-live="polite"></span>
    </div>
    <div id="results" aria-live="polite"><em>Loading release data…</em></div>
  </div>
  <script src="app.js?v=20250627"></script>
</body>
</html>
